<!DOCTYPE html>
<html>
<head>
<title>Patients - Unicus Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="admin-header">
    <div class="brand">
        <a href="dashboard.html" style="text-decoration:none;">Unicus Diagnostics - <span id="brandRole">Admin</span></a>
    </div>
    <div class="user-info">
        <span id="userDisplay"></span>
        <button onclick="logout()">Logout</button>
    </div>
</div>
<div class="admin-layout">
<nav class="admin-sidebar">
    <a href="dashboard.html">Dashboard</a>
    <div class="sidebar-section">
        <button class="sidebar-toggle" onclick="toggleBookingsMenu(event)">Bookings ▾</button>
        <div class="sidebar-submenu" id="bookingsMenu">
            <a href="bookings.html">All Bookings</a>
            <a href="bookings.html?status=pending">Incomplete</a>
            <a href="bookings.html?status=completed">Complete</a>
            <a href="bookings.html?status=confirmed">Pending Approval</a>
            <a href="bookings.html?status=approved">Approved</a>
            <a href="bookings.html?status=cancelled">Cancelled</a>
        </div>
    </div>
    <a href="reports.html">Reports</a>
    <a href="patients.html" class="active">Patients</a>
    <a href="tests.html">Tests</a>
    <a href="doctors.html">Doctors</a>
    <a href="privileges.html" id="privilegesLink">Privileges</a>
    <div class="sidebar-spacer"></div>
    <a href="#" class="sidebar-logout" onclick="logout()">Logout</a>
</nav>
<div class="admin-content">
    <div class="data-table-wrap">
        <div class="table-header">
            <h2>All Patients</h2>
            <input type="text" id="searchInput" placeholder="Search by name or phone..." onkeyup="filterTable()">
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Registered</th>
                </tr>
            </thead>
            <tbody id="patientsBody"></tbody>
        </table>
    </div>
</div>
</div>
<script src="script.js"></script>
<script>
requireAuth();
var ROLE = localStorage.getItem('admin_role');
document.getElementById('userDisplay').textContent = USERNAME || 'Admin';
var brandRole = document.getElementById('brandRole');
if (brandRole) brandRole.textContent = ROLE === 'owner' ? 'Owner' : 'Admin';
var privilegesLink = document.getElementById('privilegesLink');
if (privilegesLink && ROLE !== 'owner') privilegesLink.style.display = 'none';

function loadPatients() {
    api('/patients').then(function(patients) {
        var tbody = document.getElementById('patientsBody');
        tbody.innerHTML = '';
        patients.forEach(function(p) {
            tbody.innerHTML +=
                '<tr>' +
                '<td>' + escapeHtml(p.name) + '</td>' +
                '<td>' + escapeHtml(p.phone) + '</td>' +
                '<td>' + escapeHtml(p.address) + '</td>' +
                '<td>' + escapeHtml((p.created_at || '').substring(0, 10)) + '</td>' +
                '</tr>';
        });
    });
}

function filterTable() {
    var input = document.getElementById('searchInput').value.toLowerCase();
    var rows = document.querySelectorAll('#patientsBody tr');
    rows.forEach(function(row) {
        var text = row.textContent.toLowerCase();
        row.style.display = text.indexOf(input) > -1 ? '' : 'none';
    });
}

function logout() {
    api('/logout', 'POST').then(function() {
        localStorage.removeItem('admin_token');
        localStorage.removeItem('admin_username');
        window.location.href = 'login.html';
    });
}

loadPatients();
</script>
</body>
</html>
