<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Unicus Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="admin-header">
        <div class="brand">
            <a href="dashboard.html" style="text-decoration:none;">Unicus Diagnostics - <span id="brandRole">Admin</span></a>
        </div>
        <div class="user-info">
            <span id="userDisplay"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
<div class="admin-layout">
<nav class="admin-sidebar">
    <a href="dashboard.html" class="active">Dashboard</a>
    <div class="sidebar-section">
        <button class="sidebar-toggle" onclick="toggleBookingsMenu(event)">Bookings ▾</button>
        <div class="sidebar-submenu" id="bookingsMenu">
            <a href="bookings.html">All Bookings</a>
            <a href="bookings.html?status=pending">Incomplete</a>
            <a href="bookings.html?status=completed">Complete</a>
            <a href="bookings.html?status=confirmed">Pending Approval</a>
            <a href="bookings.html?status=approved">Approved</a>
            <a href="bookings.html?status=cancelled">Cancelled</a>
        </div>
    </div>
    <a href="reports.html">Reports</a>
    <a href="patients.html">Patients</a>
    <a href="tests.html">Tests</a>
    <a href="doctors.html">Doctors</a>
    <a href="privileges.html" id="privilegesLink">Privileges</a>
    <div class="sidebar-spacer"></div>
    <a href="#" class="sidebar-logout" onclick="logout()">Logout</a>
</nav>
<div class="admin-content">
    <div class="dashboard-cards" id="dashboardCards">
        <div class="dashboard-card">
            <div class="number" id="totalPatients">-</div>
            <div class="label">Total Patients</div>
        </div>
        <div class="dashboard-card">
            <div class="number" id="totalBookings">-</div>
            <div class="label">Total Bookings</div>
        </div>
        <div class="dashboard-card">
            <div class="number" id="todaysBookings">-</div>
            <div class="label">Today's Bookings</div>
        </div>
        <div class="dashboard-card">
            <div class="number" id="todaysReports">-</div>
            <div class="label">Reports Generated Today</div>
        </div>
    </div>
</div>
</div>
<script src="script.js"></script>
<script>
requireAuth();
document.getElementById('userDisplay').textContent = USERNAME || 'Admin';
var brandRole = document.getElementById('brandRole');
if (brandRole) brandRole.textContent = ROLE === 'owner' ? 'Owner' : 'Admin';
var privilegesLink = document.getElementById('privilegesLink');
if (privilegesLink && ROLE !== 'owner') privilegesLink.style.display = 'none';

function loadDashboard() {
    api('/dashboard').then(function(d) {
        document.getElementById('totalPatients').textContent = d.total_patients;
        document.getElementById('totalBookings').textContent = d.total_bookings;
        document.getElementById('todaysBookings').textContent = d.todays_bookings;
        document.getElementById('todaysReports').textContent = d.reports_today;
    });
}

function logout() {
    api('/logout', 'POST').then(function() {
        localStorage.removeItem('admin_token');
        localStorage.removeItem('admin_username');
        localStorage.removeItem('admin_role');
        window.location.href = 'login.html';
    });
}

loadDashboard();
</script>
</body>
</html>
